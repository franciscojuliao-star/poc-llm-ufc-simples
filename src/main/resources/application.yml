spring:
  application:
    name: poc-llm-ufc-simples

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/poc_llm_simples}
    username: ${DB_USERNAME:poc_user}
    password: ${DB_PASSWORD:poc123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

upload:
  dir: ${UPLOAD_DIR:uploads}

rag:
  api:
    base-url: ${RAG_API_URL:http://localhost:8000}
    key: ${RAG_API_KEY:integracoes-dev-key-mude-em-producao}

logging:
  level:
    br.ufc.llm: DEBUG
    org.springframework.ai: INFO
